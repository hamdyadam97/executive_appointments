{% extends 'base.html' %}
{% block title %}تسجيل الدخول - نظام حجز المواعيد{% endblock %}

{% block auth_content %}
<div class="login-page">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </div>
            <h1 class="login-title">نظام حجز المواعيد</h1>
            <p class="login-subtitle">المدير التنفيذي</p>
        </div>

        <!-- Form -->
        <form method="post" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label>{{ form.email.label }}</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    {{ form.email }}
                </div>
            </div>

            <div class="form-group">
                <label>{{ form.password.label }}</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    {{ form.password }}
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">تسجيل الدخول</button>
        </form>
    </div>
</div>
{% endblock %}
